<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijava — {{ company_name }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f1e30;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-area img { height: 48px; margin-bottom: 8px; }
  .logo-area h1 { font-size: 22px; font-weight: 700; color: #1a3a5c; }
  .logo-area p { font-size: 13px; color: #888; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; color: #1a3a5c;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: #1a3a5c; }
  .btn-login {
    width: 100%; padding: 13px;
    background: #1a3a5c; color: white;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: #2d5986; }
  .error {
    background: #fdecea; color: #c0392b;
    border: 1px solid #f5aca6; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 20px;
  }
  .footer-note {
    text-align: center; font-size: 11px;
    color: #aaa; margin-top: 24px;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <h1>{{ company_name }}</h1>
    <p>Prijavite se za nastavak</p>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <div id="error-msg" class="error" style="display:none;"></div>

  <div class="form-group">
    <label>Korisničko ime</label>
    <input type="text" id="username" placeholder="username" autofocus autocomplete="username">
  </div>
  <div class="form-group">
    <label>Lozinka</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">Prijava</button>
  <div class="footer-note">{{ company_name }} &copy; 2026</div>
  <div style="text-align:center;margin-top:12px;">
    <img src="/static/{{ company_logo }}" alt="{{ company_name }}" onerror="this.style.display='none'" style="height:32px;opacity:0.4;">
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = 'Unesite korisničko ime i lozinku.';
    errEl.style.display = 'block';
    return;
  }

  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = data.redirect || '/';
  } else {
    errEl.textContent = data.error || 'Greška pri prijavi.';
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
