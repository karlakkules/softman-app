<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Promjena lozinke — {{ company_name }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1e30; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
  h1 { font-size: 20px; font-weight: 700; color: #1a3a5c; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .notice { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #7a5c00; margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #1a3a5c; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #1a3a5c; }
  .btn { width: 100%; padding: 13px; background: #1a3a5c; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #2d5986; }
  .error { background: #fdecea; color: #c0392b; border: 1px solid #f5aca6; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .success { background: #f0faf4; color: #27ae60; border: 1px solid #a8d5b5; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Promjena lozinke</h1>
  <p class="subtitle">{{ company_name }}</p>
  <div class="notice">⚠️ Administrator je postavio privremenu lozinku. Molimo postavite novu lozinku za nastavak.</div>
  <div class="error" id="err"></div>
  <div class="success" id="ok"></div>
  <div class="form-group">
    <label>Trenutna (privremena) lozinka</label>
    <input type="password" id="current" placeholder="••••••••">
  </div>
  <div class="form-group">
    <label>Nova lozinka</label>
    <input type="password" id="new1" placeholder="••••••••">
  </div>
  <div class="form-group">
    <label>Potvrdi novu lozinku</label>
    <input type="password" id="new2" placeholder="••••••••" onkeydown="if(event.key==='Enter') doChange()">
  </div>
  <button class="btn" onclick="doChange()">Promijeni lozinku</button>
</div>
<script>
async function doChange() {
  const current = document.getElementById('current').value;
  const new1 = document.getElementById('new1').value;
  const new2 = document.getElementById('new2').value;
  const err = document.getElementById('err');
  const ok = document.getElementById('ok');
  err.style.display = 'none'; ok.style.display = 'none';
  if (!current || !new1 || !new2) { err.textContent = 'Popunite sva polja.'; err.style.display = 'block'; return; }
  if (new1 !== new2) { err.textContent = 'Nove lozinke se ne podudaraju.'; err.style.display = 'block'; return; }
  if (new1.length < 6) { err.textContent = 'Nova lozinka mora imati najmanje 6 znakova.'; err.style.display = 'block'; return; }
  const res = await fetch('/api/users/change-password', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({current_password: current, new_password: new1})
  });
  const d = await res.json();
  if (d.success) {
    ok.textContent = '✅ Lozinka uspješno promijenjena! Preusmjeravam...';
    ok.style.display = 'block';
    setTimeout(() => window.location.href = '/', 1500);
  } else {
    err.textContent = d.error || 'Greška pri promjeni lozinke.';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
